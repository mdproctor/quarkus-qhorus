name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        # LLM examples (examples/agent-communication) are behind -Pwith-llm-examples.
        # Default CI build runs the type-system regression tests (no model download required).
        run: mvn -B clean install -Dno-format
