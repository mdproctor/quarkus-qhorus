# Default: Jlama — pure Java inference, no external process required.
# Model (~700MB) downloads from HuggingFace on first run, cached in ~/.jlama/.
# Requires Java 21+ (uses Vector API for SIMD acceleration).
quarkus.langchain4j.jlama.chat-model.model-name=tjake/Llama-3.2-1B-Instruct-Jlama-Q4
quarkus.langchain4j.jlama.chat-model.temperature=0.1
quarkus.langchain4j.jlama.timeout=120s
quarkus.langchain4j.jlama.log-requests=true
quarkus.langchain4j.jlama.log-responses=true

# --- Switching providers ---
# To use Ollama (faster, requires ollama serve + ollama pull gemma3:1b):
#   1. Swap pom.xml dependency: jlama → langchain4j-ollama
#   2. Uncomment below:
# quarkus.langchain4j.ollama.base-url=http://localhost:11434
# quarkus.langchain4j.ollama.chat-model.model-id=gemma3:1b
# quarkus.langchain4j.ollama.timeout=60s

# To use Anthropic Claude Haiku (requires ANTHROPIC_API_KEY):
#   1. Swap pom.xml dependency: jlama → langchain4j-anthropic
#   2. Uncomment below:
# quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
# quarkus.langchain4j.anthropic.chat-model.model-name=claude-haiku-4-5-20251001

# Qhorus — InMemory stores replace JPA stores at runtime
quarkus.arc.selected-alternatives=\
  io.casehub.qhorus.testing.InMemoryChannelStore,\
  io.casehub.qhorus.testing.InMemoryMessageStore,\
  io.casehub.qhorus.testing.InMemoryInstanceStore,\
  io.casehub.qhorus.testing.InMemoryDataStore,\
  io.casehub.qhorus.testing.InMemoryCommitmentStore

# H2 datasources — required for Quarkus/Hibernate to boot even though
# InMemory stores are used and no SQL is executed against them.
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:examples;DB_CLOSE_DELAY=-1
quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.username=sa
quarkus.datasource.qhorus.password=
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:examples;DB_CLOSE_DELAY=-1
quarkus.datasource.reactive=false
quarkus.datasource.qhorus.reactive=false
quarkus.hibernate-orm.packages=io.casehub.qhorus.runtime.config
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.qhorus.database.generation=drop-and-create
casehub.ledger.enabled=true
quarkus.flyway.qhorus.migrate-at-start=false

quarkus.http.test-port=0
