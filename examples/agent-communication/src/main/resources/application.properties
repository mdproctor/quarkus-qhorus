# Default: Jlama — pure Java inference, no external process required.
# Model (~700MB) downloads from HuggingFace on first run, cached in ~/.jlama/.
# Requires Java 21+ (uses Vector API for SIMD acceleration).
quarkus.langchain4j.jlama.chat-model.model-name=tjake/Llama-3.2-1B-Instruct-Jlama-Q4
quarkus.langchain4j.jlama.chat-model.temperature=0.1
quarkus.langchain4j.jlama.timeout=120s
quarkus.langchain4j.jlama.log-requests=true
quarkus.langchain4j.jlama.log-responses=true

# --- Switching providers ---
# To use Ollama (faster, requires ollama serve + ollama pull gemma3:1b):
#   1. Swap pom.xml dependency: jlama → langchain4j-ollama
#   2. Uncomment below:
# quarkus.langchain4j.ollama.base-url=http://localhost:11434
# quarkus.langchain4j.ollama.chat-model.model-id=gemma3:1b
# quarkus.langchain4j.ollama.timeout=60s

# To use Anthropic Claude Haiku (requires ANTHROPIC_API_KEY):
#   1. Swap pom.xml dependency: jlama → langchain4j-anthropic
#   2. Uncomment below:
# quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
# quarkus.langchain4j.anthropic.chat-model.model-name=claude-haiku-4-5-20251001

# Qhorus — InMemory stores (no database needed)
quarkus.arc.selected-alternatives=\
  io.quarkiverse.qhorus.testing.InMemoryChannelStore,\
  io.quarkiverse.qhorus.testing.InMemoryMessageStore,\
  io.quarkiverse.qhorus.testing.InMemoryInstanceStore,\
  io.quarkiverse.qhorus.testing.InMemoryDataStore,\
  io.quarkiverse.qhorus.testing.InMemoryPendingReplyStore

quarkus.http.test-port=0
