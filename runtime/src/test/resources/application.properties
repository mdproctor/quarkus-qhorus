# Use random port to avoid conflicts with other services (e.g. Claudony on 8081)
quarkus.http.test-port=0

# Test datasource — H2 in-memory (default).
# Required for casehub-ledger library beans (LedgerVerificationService,
# LedgerRetentionJob, etc.) that inject @Default EntityManager — these cannot
# be updated to use @PersistenceUnit("qhorus") as they are library code.
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1

# Named 'qhorus' datasource — same H2 in-memory for tests.
# Satisfies quarkus.hibernate-orm.qhorus.datasource=qhorus in main application.properties.
quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.username=sa
quarkus.datasource.qhorus.password=
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1

# Default PU packages — no JPA entities live here; this config is required by Quarkus
# when multiple persistence units exist. The config package has only @ConfigMapping
# classes. The @Default EntityManager from this PU satisfies casehub-ledger services.
quarkus.hibernate-orm.packages=io.casehub.qhorus.runtime.config

# Schema creation for both persistence units; Flyway disabled in tests.
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.qhorus.database.generation=drop-and-create
quarkus.flyway.qhorus.migrate-at-start=false

# Disable Hibernate Reactive — tests use H2 JDBC (no reactive datasource available).
# quarkus-hibernate-reactive-panache is in the extension for reactive SPI support,
# but only activates in consumer apps that configure a reactive datasource.
quarkus.datasource.reactive=false
# Also disable reactive for the named 'qhorus' datasource — FastBootHibernateReactivePersistenceProvider
# will attempt to register a reactive pool for every PU it finds; suppressing it here
# prevents a boot failure when no reactive pool is configured for the named datasource.
quarkus.datasource.qhorus.reactive=false

# casehub-ledger — enabled for tests
casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=true
casehub.ledger.decision-context.enabled=false
casehub.ledger.attestations.enabled=true
casehub.ledger.trust-score.enabled=false
