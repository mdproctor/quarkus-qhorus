# Use random port to avoid conflicts with other services (e.g. Claudony on 8081)
quarkus.http.test-port=0

# Test datasource — H2 in-memory
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1

# Hibernate creates all tables from entity definitions (ledger base + Qhorus subclass).
# Flyway is not used in tests — quarkus-ledger no longer ships SQL migrations.
quarkus.hibernate-orm.database.generation=drop-and-create

# quarkus-ledger — enabled for tests
quarkus.ledger.enabled=true
quarkus.ledger.hash-chain.enabled=true
quarkus.ledger.decision-context.enabled=false
quarkus.ledger.attestations.enabled=true
quarkus.ledger.trust-score.enabled=false
