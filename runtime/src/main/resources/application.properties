# Qhorus extension default configuration
# Consuming applications override these as needed.
# Datasource (quarkus.datasource.*) must be configured by the consuming app.

# Stale instance detection threshold
casehub.qhorus.cleanup.stale-instance-seconds=120

# Data retention (days before old messages/data are purged)
casehub.qhorus.cleanup.data-retention-days=7

# MCP server traffic logging (off by default — verbose in dev)
quarkus.mcp.server.traffic-log.enabled=false

# Named Hibernate ORM persistence unit — all Qhorus entities + ledger base class
# (LedgerEntry included because AgentMessageLedgerEntry extends it via JOINED inheritance;
#  see ADR-0004 for the revisit plan when casehub-ledger adopts its own named PU)
quarkus.hibernate-orm.qhorus.datasource=qhorus
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime

# Flyway migrations for the qhorus datasource
quarkus.flyway.qhorus.locations=db/migration
quarkus.flyway.qhorus.migrate-at-start=true
